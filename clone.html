<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugx Gaming Hero</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class="bg-cover bg-center min-h-screen" style="background-image: url('clone image/banner-bg.jpg.jpeg')">
        <div class="flex items-center justify-between p-4">
            <div class="flex"> 
                <img src="clone image/logo.png" alt="My Image"> 
            </div>
            <div class="flex justify-end gap-4 items-center text-white">
                <a href="" class="bg-blue-500 rounded-full hover:bg-blue-400 transition px-6 py-3">Home</a>
                <a href="" class="bg-blue-500 rounded-full hover:bg-blue-400 transition px-6 py-3">Our Shop</a>
                <a href="" class="bg-blue-500 rounded-full hover:bg-blue-400 transition px-6 py-3">Product Details</a>
                <a href="" class="bg-blue-500 rounded-full hover:bg-blue-400 transition px-6 py-3">Contact Us</a>
                <a href="" class="bg-red-500 rounded-full hover:bg-red-400 transition px-6 py-3">Sign</a>
            </div>
        </div>

        <div class="flex flex-col md:flex-row w-full justify-between items-center px-12 py-16 gap-12">
            
            <div class="max-w-xl text-white text-center md:text-left space-y-4">
                <h2 class="text-xl font-bold tracking-wider text-white">WELCOME TO LUGX</h2>
                
                <div class="relative inline-block">
                    <h1 class="text-5xl font-black leading-tight">
                        BEST GAMING SITE <br>EVER!
                    </h1>
                    <img src="clone image/caption-dec.png" class="absolute left-0 -bottom-2 w-48" alt="decoration">
                </div>
                
                <div class="text-lg opacity-90 space-y-2 pt-4">
                    <p>LUGX Gaming is a free Bootstrap HTML CSS website template for your gaming websites.</p>
                    <p>You can download and use this layout for commercial purposes.</p>
                    <p>Please tell your friends about TemplateMO.</p>
                </div>
                <div class="max-w-md mx-auto p-4">
  <form class="flex items-center bg-white rounded-full p-0.5 shadow-md w-full">
    
    <input 
      type="text" 
      placeholder="Type Something" 
      class="w-full bg-transparent pl-6 pr-4 py-3 text-gray-600 placeholder-gray-400 outline-none rounded-l-full"
    />
    
    <button 
      type="submit" 
      class="bg-rose-500 hover:bg-rose-600 transition-colors text-white font-bold text-xs uppercase tracking-wider px-8 py-3.5 rounded-full shrink-0 mr-0.5"
    >
      Search Now
    </button>

  </form>
</div>
            </div>

            <div class="relative w-80 mr-8 shrink-0">
                <img src="clone image/banner-image.jpg.jpeg" class="rounded-3xl w-full h-[420px] object-cover shadow-2xl" alt="Character Banner">
                
                <span class="absolute top-4 right-4 rounded-full bg-blue-400 px-4 py-1.5 text-sm font-bold text-white shadow-md">
                    $22
                </span>

                <div class="absolute -bottom-6 -left-6 flex h-20 w-20 items-center justify-center rounded-full bg-red-400 text-lg font-black text-white shadow-xl">
                    <span class="translate-x-1 -translate-y-1">-40%</span>
                </div>
            </div>

        </div>
    </header>
</body>

</html>
